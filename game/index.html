<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok's AI Superhero Adventure</title>
    <style>
        body { font-family: Comic Sans MS, cursive; background: linear-gradient(#0a0a2a, #1a4a8a); color: white; text-align: center; padding: 20px; }
        .scene { max-width: 800px; margin: 0 auto; background: rgba(0,0,0,0.7); padding: 30px; border-radius: 20px; }
        button { background: #ffcc00; color: #000; padding: 15px 30px; margin: 10px; font-size: 1.2em; border: none; border-radius: 50px; cursor: pointer; }
        button:hover { background: #ffff00; transform: scale(1.05); }
        .score { font-size: 1.5em; color: #ffcc00; }
    </style>
</head>
<body>
    <div class="scene">
        <h1>🚀 Grok's AI Superhero Adventure 🌌</h1>
        <div id="score" class="score">Score: 0</div>
        <div id="story"></div>
        <div id="choices"></div>
    </div>

    <script>
        let score = 0;
        let currentScene = 0;

        const scenes = [
            {
                text: "Welcome, young hero! You are on a mission in space with your AI team. First, meet Gitlawb - the shared playground for code toys! What do you do?",
                choices: [
                    {text: "Explore the playground", next: 1, points: 10},
                    {text: "Ask OpenClaude for help", next: 2, points: 15}
                ]
            },
            {
                text: "Great! Gitlawb lets AI and humans build together. Now use OpenGateway - the magic door to many AIs including Grok!",
                choices: [{text: "Call Grok for a joke", next: 3, points: 20}]
            },
            {
                text: "You completed a mission! You learned how connectors search for info and skills build files. Final score:",
                choices: [{text: "Play Again", next: 0, points: 0}]
            }
        ];

        function loadScene(n) {
            currentScene = n;
            const scene = scenes[n];
            document.getElementById('story').innerHTML = `<p>${scene.text}</p>`;
            const choicesDiv = document.getElementById('choices');
            choicesDiv.innerHTML = '';
            scene.choices.forEach((choice, i) => {
                const btn = document.createElement('button');
                btn.textContent = choice.text;
                btn.onclick = () => {
                    score += choice.points;
                    document.getElementById('score').textContent = `Score: ${score}`;
                    loadScene(choice.next);
                };
                choicesDiv.appendChild(btn);
            });
        }

        loadScene(0);
    </script>
</body>
</html>
